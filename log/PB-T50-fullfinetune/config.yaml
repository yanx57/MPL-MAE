dataset:
  test:
    _base_: cfgs/dataset_configs/ScanObjectNN_hardest.yaml
    others:
      subset: test
  train:
    _base_: cfgs/dataset_configs/ScanObjectNN_hardest.yaml
    others:
      subset: train
  val:
    _base_: cfgs/dataset_configs/ScanObjectNN_hardest.yaml
    others:
      subset: test
grad_norm_clip: 10
max_epoch: 300
model:
  NAME: PointTransformer
  cls_dim: 15
  depth: 12
  drop_path_rate: 0.05
  ema_decay: 0.999
  encoder_dims: 384
  group_size: 32
  head_dp: 0.45
  num_group: 128
  num_heads: 6
  smoothing: 0.0
  trans_dim: 384
  type: full
npoints: 2048
optimizer:
  head:
    lr: 0.00045
    weight_decay: 0.01
  kwargs:
    lr: 2.0e-05
    weight_decay: 0.05
  type: AdamW
scheduler:
  kwargs:
    epochs: 300
    initial_epochs: 10
  type: CosLR
seed: 106
step_per_update: 1
total_bs: 32

dataset:
  test:
    _base_: cfgs/dataset_configs/ModelNet40.yaml
    others:
      subset: test
  train:
    _base_: cfgs/dataset_configs/ModelNet40FewShot.yaml
    others:
      subset: train
  val:
    _base_: cfgs/dataset_configs/ModelNet40FewShot.yaml
    others:
      subset: test
grad_norm_clip: 10
max_epoch: 150
model:
  NAME: PointTransformer
  cls_dim: 40
  depth: 12
  drop_path_rate: 0.1
  ema_decay: 0.999
  encoder_dims: 384
  feat_agg: mean_max
  group_size: 32
  head_dp: 0.5
  num_group: 64
  num_heads: 6
  smoothing: 0.0
  trans_dim: 384
  type: full
npoints: 1024
optimizer:
  head:
    lr: 5e-3
    weight_decay: 0.05
  kwargs:
    lr: 5e-4
    weight_decay: 0.05
  type: AdamW
scheduler:
  kwargs:
    epochs: 150
    initial_epochs: 10
  type: CosLR
seed: 0
step_per_update: 1
total_bs: 32

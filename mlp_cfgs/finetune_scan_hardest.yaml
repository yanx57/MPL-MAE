optimizer : {
  type: AdamW,
  head: {
    lr: 2e-3,
    weight_decay: 0.05,
  }, 
  kwargs: {
  lr : 2e-5,
  weight_decay : 0.05
}}
scheduler: {
  type: CosLR,
  kwargs: {
    epochs: 300,
    initial_epochs : 10
}}

dataset : {
  train : { _base_: cfgs/dataset_configs/ScanObjectNN_hardest.yaml,
            others: {subset: 'train'}},
  val : { _base_: cfgs/dataset_configs/ScanObjectNN_hardest.yaml,
            others: {subset: 'test'}},
  test : { _base_: cfgs/dataset_configs/ScanObjectNN_hardest.yaml,
            others: {subset: 'test'}}}
model : {
  NAME: PointTransformer,
  trans_dim: 384,
  depth: 12,
  drop_path_rate: 0.1,
  cls_dim: 15,
  num_heads: 6,
  group_size: 32,
  num_group: 128,
  head_dp: 0.5,
  smoothing: 0.0,
  ema_decay: 0.999,
  encoder_dims: 384,
  feat_agg: cls_mean,
  type: mlp3,
}


npoints: 2048
total_bs : 32
step_per_update : 1
max_epoch : 300
grad_norm_clip : 10
seed: 0
